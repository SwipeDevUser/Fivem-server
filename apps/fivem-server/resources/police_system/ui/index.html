<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Police System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="police-ui" class="police-ui" style="display: none;">
        <div class="header">
            <h1>Police Management System</h1>
            <button class="close-btn" onclick="closeUI()">✕</button>
        </div>
        
        <div class="content">
            <div class="section">
                <h2>Player Management</h2>
                <div class="input-group">
                    <label>Player ID:</label>
                    <input type="text" id="playerId" placeholder="Enter player ID">
                </div>
                
                <div class="button-group">
                    <button onclick="cuffPlayer()">Cuff</button>
                    <button onclick="searchPlayer()">Search</button>
                </div>
            </div>
            
            <div class="section">
                <h2>Arrest Player</h2>
                <div class="input-group">
                    <label>Jail Time (minutes):</label>
                    <input type="number" id="jailTime" placeholder="10" value="10">
                </div>
                <button onclick="arrestPlayer()" class="arrest-btn">Arrest</button>
            </div>
            
            <div class="section">
                <h2>Fine Player</h2>
                <div class="input-group">
                    <label>Fine Amount:</label>
                    <input type="number" id="fineAmount" placeholder="500" value="500">
                </div>
                <button onclick="finePlayer()" class="fine-btn">Fine</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
