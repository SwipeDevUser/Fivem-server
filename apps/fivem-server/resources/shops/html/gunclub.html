<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Gun Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        .gunclub-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 3px solid #b22222;
        }

        /* Header */
        .gunclub-header {
            background: linear-gradient(to right, #b22222, #8b0000);
            padding: 20px;
            border-bottom: 3px solid #ffd700;
            text-align: center;
            box-shadow: 0 4px 12px rgba(178, 34, 34, 0.5);
        }

        .gunclub-header h1 {
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .gunclub-header p {
            font-size: 0.9em;
            color: #f5f5f5;
            margin-top: 5px;
            font-style: italic;
        }

        /* Main Content */
        .gunclub-main {
            display: flex;
            height: calc(100vh - 120px);
        }

        /* Categories Sidebar */
        .gunclub-categories {
            width: 20%;
            background: #1a1a1a;
            border-right: 2px solid #b22222;
            overflow-y: auto;
            padding: 20px 0;
        }

        .category-btn {
            width: 100%;
            padding: 15px 20px;
            background: #2a2a2a;
            border: none;
            border-left: 4px solid transparent;
            color: #fff;
            cursor: pointer;
            font-size: 1em;
            text-align: left;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .category-btn:hover {
            background: #3a3a3a;
            border-left-color: #ffd700;
            padding-left: 25px;
        }

        .category-btn.active {
            background: #b22222;
            border-left-color: #ffd700;
            color: #ffd700;
        }

        /* Items Grid */
        .gunclub-items {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            flex-grow: 1;
        }

        .item-card {
            background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
            border: 2px solid #b22222;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(178, 34, 34, 0.4);
            border-color: #ffd700;
        }

        .item-card.selected {
            background: #b22222;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .item-icon {
            font-size: 3em;
            margin-bottom: 10px;
            text-align: center;
        }

        .item-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .item-description {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 12px;
            min-height: 30px;
        }

        .item-price {
            font-size: 1.3em;
            color: #ffd700;
            font-weight: bold;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid #555;
        }

        /* Bottom Buttons */
        .gunclub-footer {
            padding: 20px;
            background: #1a1a1a;
            border-top: 2px solid #b22222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gunclub-total {
            font-size: 1.3em;
            color: #ffd700;
            font-weight: bold;
        }

        .gunclub-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-buy {
            background: #b22222;
            color: #ffd700;
            border: 2px solid #ffd700;
        }

        .btn-buy:hover {
            background: #8b0000;
            transform: scale(1.05);
        }

        .btn-checkout {
            background: #ffd700;
            color: #1a1a1a;
        }

        .btn-checkout:hover {
            background: #ffed4e;
            transform: scale(1.05);
        }

        .btn-close {
            background: #444;
            color: #fff;
        }

        .btn-close:hover {
            background: #555;
        }

        /* Cart Badge */
        .cart-badge {
            background: #ffd700;
            color: #1a1a1a;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #888;
        }

        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #b22222;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }

        /* Receipt */
        .receipt-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            border: 3px solid #b22222;
            border-radius: 10px;
            padding: 30px;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(178, 34, 34, 0.6);
        }

        .receipt-container.show {
            display: block;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px solid #b22222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .receipt-header h2 {
            color: #ffd700;
            font-size: 1.5em;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #444;
            color: #fff;
        }

        .receipt-item-name {
            flex: 1;
        }

        .receipt-item-total {
            color: #ffd700;
            font-weight: bold;
        }

        .receipt-total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            font-size: 1.3em;
            border-top: 2px solid #b22222;
            margin-top: 15px;
            color: #ffd700;
            font-weight: bold;
        }

        .receipt-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #444;
            color: #aaa;
            font-style: italic;
        }

        .receipt-footer p {
            margin-top: 10px;
        }

        .receipt-close {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="gunclub-container">
        <div class="gunclub-header">
            <h1>🔫 Orlando Gun Club 🔫</h1>
            <p>Est. 2010 - Your Trusted Firearms Dealer | Safety First, Always</p>
        </div>

        <div class="gunclub-main">
            <div class="gunclub-categories">
                <button class="category-btn active" data-category="pistols">
                    🔫 Pistols
                </button>
                <button class="category-btn" data-category="rifles">
                    🎯 Rifles
                </button>
                <button class="category-btn" data-category="shotguns">
                    💥 Shotguns
                </button>
                <button class="category-btn" data-category="ammunition">
                    📦 Ammunition
                </button>
                <button class="category-btn" data-category="accessories">
                    ⚙️ Accessories
                </button>
                <button class="category-btn" data-category="safety">
                    🛡️ Safety Gear
                </button>
            </div>

            <div class="gunclub-items">
                <div class="items-grid" id="itemsGrid">
                    <!-- Items will be populated here -->
                </div>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-state-icon">🔍</div>
                    <p>No items in this category</p>
                </div>
            </div>
        </div>
    </div>

    <div class="gunclub-footer">
        <div class="gunclub-total">
            Total: $<span id="totalAmount">0</span>
        </div>
        <div class="gunclub-buttons">
            <button class="btn btn-buy" id="buyBtn" disabled>Add to Cart</button>
            <button class="btn btn-checkout" id="checkoutBtn" disabled>
                Checkout <span class="cart-badge" id="cartBadge">0</span>
            </button>
            <button class="btn btn-close" id="closeBtn">Close</button>
        </div>
    </div>

    <div class="receipt-container" id="receiptContainer">
        <div class="receipt-header">
            <h2>🔫 Receipt 🔫</h2>
            <p>Orlando Gun Club</p>
        </div>
        <div id="receiptItems"></div>
        <div class="receipt-total">
            <span>Total:</span>
            <span id="receiptTotal">$0</span>
        </div>
        <div class="receipt-footer">
            <p>Thank you for your business!</p>
            <p>Safety First, Always</p>
            <p>Stay responsible 🔒</p>
        </div>
        <button class="btn btn-close receipt-close" id="receiptCloseBtn">Close Receipt</button>
    </div>

    <script>
        const gunClubData = window.gunClubStore || {};
        let selectedItem = null;
        let cart = [];
        let currentCategory = 'pistols';

        // Initialize
        function init() {
            setupEventListeners();
            loadItems(currentCategory);
            updateCartBadge();
        }

        function setupEventListeners() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    loadItems(currentCategory);
                    selectedItem = null;
                });
            });

            document.getElementById('buyBtn').addEventListener('click', addToCart);
            document.getElementById('checkoutBtn').addEventListener('click', checkout);
            document.getElementById('closeBtn').addEventListener('click', closeGunClub);
            document.getElementById('receiptCloseBtn').addEventListener('click', closeReceipt);
        }

        function loadItems(category) {
            const itemsGrid = document.getElementById('itemsGrid');
            itemsGrid.innerHTML = '';

            const items = gunClubData.categories?.[category]?.items || [];

            if (items.length === 0) {
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('buyBtn').disabled = true;
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div>
                        <div class="item-icon">🔫</div>
                        <div class="item-name">${item.label}</div>
                        <div class="item-description">${item.name}</div>
                    </div>
                    <div class="item-price">$${item.price.toLocaleString()}</div>
                `;

                card.addEventListener('click', () => selectItem(item, card));
                itemsGrid.appendChild(card);
            });
        }

        function selectItem(item, element) {
            document.querySelectorAll('.item-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            selectedItem = item;
            document.getElementById('totalAmount').textContent = item.price.toLocaleString();
            document.getElementById('buyBtn').disabled = false;
        }

        function addToCart() {
            if (!selectedItem) return;

            const existingItem = cart.find(i => i.name === selectedItem.name);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    name: selectedItem.name,
                    label: selectedItem.label,
                    price: selectedItem.price,
                    quantity: 1
                });
            }

            updateCartBadge();
            showNotification(`✓ ${selectedItem.label} added to cart!`);
        }

        function updateCartBadge() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
            document.getElementById('checkoutBtn').disabled = total === 0;
        }

        function checkout() {
            if (cart.length === 0) return;

            fetch(`https://${GetParentResourceName()}/gunclubCheckout`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    cart: cart
                })
            }).then(r => r.json()).catch(e => console.error(e));

            showReceipt();
        }

        function showReceipt() {
            const receiptItems = document.getElementById('receiptItems');
            receiptItems.innerHTML = '';

            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'receipt-item';
                itemDiv.innerHTML = `
                    <span class="receipt-item-name">${item.label} x${item.quantity}</span>
                    <span class="receipt-item-total">$${itemTotal.toLocaleString()}</span>
                `;
                receiptItems.appendChild(itemDiv);
            });

            document.getElementById('receiptTotal').textContent = `$${total.toLocaleString()}`;
            document.getElementById('receiptContainer').classList.add('show');

            cart = [];
            updateCartBadge();
        }

        function closeReceipt() {
            document.getElementById('receiptContainer').classList.remove('show');
        }

        function closeGunClub() {
            fetch(`https://${GetParentResourceName()}/closeGunClub`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            }).then(r => r.json()).catch(e => console.error(e));
        }

        function showNotification(message) {
            // Simple notification (in real implementation, use a toast library)
            console.log(message);
        }

        window.addEventListener('message', function(event) {
            if (event.data.type === 'openGunClub') {
                window.gunClubStore = event.data.store;
                document.body.style.display = 'block';
                loadItems('pistols');
            }
        });

        init();
    </script>
</body>
</html>
