name: CI/CD — Build & Blue/Green Deploy (defaults)

on:
  push:
    branches:
      - main
      - release
      - develop
      - feature/*
      - hotfix/*
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  K8S_NAMESPACE: default
  K8S_DEPLOYMENT: my-app
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/release' && 'staging' || github.ref == 'refs/heads/develop' && 'integration' || 'development' }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU and Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to ghcr.io
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.IMAGE }}
          file: ./Dockerfile

  deploy-staging:
    name: Deploy to staging/production
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref != 'refs/heads/hotfix/*'
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig (staging)
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl config current-context
      - name: Update deployment image (staging)
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/${{ env.K8S_DEPLOYMENT }} *=${{ env.IMAGE }} --record
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/${{ env.K8S_DEPLOYMENT }} --timeout=120s
      - name: Smoke test (staging)
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} run --rm -i --restart=Never smoke --image=curlimages/curl -- sh -c "curl -fsS http://$(kubectl -n ${{ env.K8S_NAMESPACE }} get svc ${{ env.K8S_DEPLOYMENT }} -o jsonpath='{.spec.clusterIP}'):80/health" 

  promote-production:
    name: Promote to Production (manual approval via environment)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig (prod)
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl config current-context

      - name: Run DB migrations (prod)
        if: secrets.MIGRATION_COMMAND
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} create job migrate-$$ --image=${{ env.IMAGE }} --restart=OnFailure -- /bin/sh -c "${{ secrets.MIGRATION_COMMAND }}"
          kubectl -n ${{ env.K8S_NAMESPACE }} wait --for=condition=complete job/migrate-$$ --timeout=600s
      - name: Update deployment image (prod)
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/${{ env.K8S_DEPLOYMENT }} *=${{ env.IMAGE }} --record
      - name: Wait rollout (prod)
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/${{ env.K8S_DEPLOYMENT }} --timeout=180s
      - name: Smoke test (prod)
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} run --rm -i --restart=Never smoke --image=curlimages/curl -- sh -c "curl -fsS http://$(kubectl -n ${{ env.K8S_NAMESPACE }} get svc ${{ env.K8S_DEPLOYMENT }} -o jsonpath='{.spec.clusterIP}'):80/health"

  rollback-on-failure:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [promote-production]
    if: failure()
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig (prod)
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
      - name: Rollback deployment
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout undo deployment/${{ env.K8S_DEPLOYMENT }}
