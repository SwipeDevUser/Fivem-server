# FiveM Server Configuration
# Server endpoints - REQUIRED
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Basic configuration file for FiveM server

# Server name
sv_serverName "FiveM Admin Dashboard Server"

# Server description
sv_serverDescription "A FiveM server running the admin dashboard"

# Maximum players
sv_maxclients 32

# License key (get from https://portal.cfx.re)
sv_licenseKey "cfxk_eErpbH2fz1jqWuCAwCKg_1Ir5Ee"

# Endpoint privacy mode
sv_endpointPrivacy true

# Gameplay settings
gameType "GTA V Custom"
gameName "GTAV"

# Disable automatic resource start on boot
start_mode_systemResources "disable"
start_mode_autostart "disable"

# Resource configuration
# Core resources
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure defaultCharacter

# Dashboard resources
ensure dashboard
ensure core
ensure scripts

# Uncomment to enable OneSync
# set onesync on

# Logging
sv_logFile "console.log"

# Admin log
sv_adminLog "admin.log"

# Console logging
sv_showExceptionStackTrace true
