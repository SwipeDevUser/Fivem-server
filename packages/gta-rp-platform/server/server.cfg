exec wait
version '1.0.0'
author 'Development Team'
description 'GTA RP Server Configuration'

# Server Information
sv_projectName "GTA RP Platform"
sv_projectDesc "Production Roleplay Server"
sv_instanceId 0

# Server Locale and Language
sv_locale "en_US"
sv_enforceGameBuild 3050

# Network
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Players & Slots
sv_maxclients 64
onesync_enabled 1

# Loading Screen
load_server_icon "icon.png"
ui_page "nui://ui/index.html"

# Resources - Core (START THESE FIRST)
ensure basic-gamemode
ensure spawnmanager
ensure sessionmanager
ensure fivem
ensure hardcap
ensure rconlog
ensure scoreboard
ensure playernames

# Resources - Framework
ensure core
ensure checks
ensure roles
ensure jobs
ensure economy
ensure inventory
ensure identity

# Resources - Gameplay
ensure police
ensure ems
ensure vehicles
ensure housing
ensure businesses
ensure admin
ensure security

# Resources - Support
ensure logging
ensure ui

# Commands
add_ace builtin.everyone "command.quit" allow
add_ace builtin.everyone "command.kill" allow
add_ace group.admin command allow
add_ace group.admin "command.add_ace" allow
add_ace group.admin "command.add_principal" allow
add_ace group.admin "command.remove_ace" allow
add_ace group.admin "command.remove_principal" allow
add_ace group.admin "command.stop" allow

add_principal identifier.fivem:1 group.admin

# ConVar Settings
set sv_disableDefaultSpawning -1
set sv_disableFallback 0

# Console Output
set console_channel_user 0
set console_channel_server 1
set console_channel_script 1

# Debug
set debug 1
set citizen_dir ./citizen/

# Monitoring
sv_logfile sv.log
