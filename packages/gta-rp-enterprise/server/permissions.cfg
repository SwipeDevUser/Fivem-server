################################################################################
# GTA RP Enterprise - Permissions Configuration
################################################################################

# Default group is "user", admins are in "admin"

# System Permissions
add_principal group.user command.help
add_principal group.user command.status

# Admin Permissions
add_principal group.admin command.admin
add_principal group.admin command.kick
add_principal group.admin command.ban
add_principal group.admin command.unban
add_principal group.admin command.warn
add_principal group.admin command.mute
add_principal group.admin command.freeze
add_principal group.admin command.noclip
add_principal group.admin command.teleport
add_principal group.admin command.revive
add_principal group.admin command.manage_jobs
add_principal group.admin command.announce

# Moderator Permissions
add_principal group.moderator command.kick
add_principal group.moderator command.warn
add_principal group.moderator command.mute
add_principal group.moderator command.announce

# Helper Permissions
add_principal group.helper command.help
add_principal group.helper command.job_whitelist

# Police Job Permissions
add_principal job.police command.dispatch
add_principal job.police command.jail
add_principal job.police command.cuff
add_principal job.police command.search

# EMS Job Permissions
add_principal job.ems command.revive
add_principal job.ems command.heal
add_principal job.ems command.ambulance

# Business Owner Permissions
add_principal job.business_owner command.business_manage
add_principal job.business_owner command.manage_employees
add_principal job.business_owner command.manage_inventory

# Game Master (Event Management)
add_principal group.gamemaster command.event_manage
add_principal group.gamemaster command.teleport
add_principal group.gamemaster command.give_items
add_principal group.gamemaster command.noclip

# Server Maintainer Permissions
add_principal group.maintainer resource.admin
add_principal group.maintainer resource.logging
add_principal group.maintainer resource.anti_cheat
add_principal group.maintainer console.cmds

# Add individuals to groups
# Example: add_ace identifier.license:abc123def456 group.admin allow
# Example: add_ace identifier.steam:1100001234567890 job.police allow

print "^2[Permissions] Configuration loaded successfully^7"
