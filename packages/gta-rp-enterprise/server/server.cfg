################################################################################
# GTA RP Enterprise - FiveM Server Configuration
################################################################################

################################################################################
# Server Settings
################################################################################
# Server port
sv_port 30120

# Server name
sv_serverName "GTA RP Enterprise"

# Server description
sv_description "A production-grade roleplay server with enterprise infrastructure"

# Maximum players
sv_maxclients 128

# Server language
sv_lang "en"

# Server locales
sv_locales "en_US"

################################################################################
# Resources
################################################################################

# Core Framework
ensure [core]
ensure core_framework
ensure identity
ensure session
ensure permissions

# Gameplay Systems
ensure [gameplay]
ensure inventory
ensure economy
ensure jobs
ensure police
ensure ems
ensure housing
ensure vehicles
ensure businesses

# System Resources
ensure [systems]
ensure ui
ensure notifications
ensure logging
ensure anti_cheat
ensure admin

# Standalone Resources
ensure [standalone]
ensure chat
ensure spawn
ensure loading_screen

################################################################################
# Security & Authentication
################################################################################

# Rcon password (change in production!)
rcon_password "changeme"

# Server token for rockstar
sv_license_key "changeme"

# Steam WebAPI Key (for Steam identification)
steam_webApiKey "changeme"

# Enforce Steam authentication
sv_useServerIdentifier "true"

# Enforce FiveM account authentication
sv_enforceIdentifier "true"

################################################################################
# Performance Tuning
################################################################################

# Network configuration
net_updateRate 120
net_chunkSize 32768

# Framerate limit
set sv_fps 30

# Max request handlers
set sv_request_handlers 10

# Streaming configuration
set streaming:extrasLimit 0
set streaming:garbageCollection true

# Model loading
set model_requestDelta 100
set model_requestExtra 150

################################################################################
# Data Storage
################################################################################

# Data storage type (local, mysql, postgresql)
setr data:storage "postgresql"

# Database connection string
setr data:database "host=database port=5432 user=fivem_user password=changeme dbname=fivem_db sslmode=disable"

# Cache configuration
setr cache:enabled true
setr cache:type "redis"
setr cache:host "redis"
setr cache:port 6379

################################################################################
# Logging & Monitoring
################################################################################

# Enable detailed console output
sv_logConsoleOutput 1

# Console log format
sv_consoleFormat "^5[%X] ^2%s^7"

# Enable player/admin logging
set logs:enabled true
set logs:level "info"

# Monitoring
set monitoring:enabled true
set monitoring:host "prometheus"
set monitoring:port 9090

################################################################################
# Anti-Cheat & Security
################################################################################

# Enable anti-cheat
set anticheat:enabled true
set anticheat:level "high"

# Script kick multiplier
set sv_scriptHookAllowed true

# Ban check interval
set security:banCheckInterval 60

################################################################################
# Discord Integration
################################################################################

# Admin logging webhook
set discord:adminWebhook "https://discordapp.com/api/webhooks/..."

# Audit webhook
set discord:auditWebhook "https://discordapp.com/api/webhooks/..."

# Bot token
set discord:botToken "your_bot_token"

################################################################################
# UI & Loading
################################################################################

# Loading screen
setr ui:loading_screen_url "https://yourdomain.com/loading_screen"

# UI scale
setr ui:scale 1.0

# Notifications style
setr ui:notification_style "modern"

################################################################################
# Economy Settings
################################################################################

# Starting cash for new players
set economy:startingCash 5000

# Base job salary
set economy:baseSalary 500

# Bill payment multiplier
set economy:billMultiplier 1.0

################################################################################
# Whitelist Settings
################################################################################

# Enable whitelist
set whitelist:enabled true

# Accept licensing agreement
set oneSync "on"

# OneSync population
set population:default 0
set population:enable "yes"

################################################################################
# txAdmin Settings
################################################################################

# txAdmin port
set txAdmin:port 40120

# txAdmin pin
set txAdmin:pin 0000

# txAdmin secret
set txAdmin:secret "changeme"

################################################################################
# Debug Mode (Disable in Production!)
################################################################################

# Debug mode
setr debug:enabled false

# SQL debug
setr debug:sql false

# Script debug
setr debug:scripts false

################################################################################
# End of Configuration
################################################################################

print "^2[Server] Configuration loaded successfully^7"
